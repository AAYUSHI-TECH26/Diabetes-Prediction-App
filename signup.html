{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div style="max-width:460px; margin:2.5rem auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:1.8rem;">
            <div style="font-size:2.8rem;">📝</div>
            <h2 style="margin-top:0.5rem;">Create Account</h2>
            <p style="color:#718096; font-size:0.9rem;">Join DiabetAI as a patient or doctor</p>
        </div>
        <form method="POST">
            <div style="margin-bottom:1rem;">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required>
            </div>
            <div style="margin-bottom:1rem;">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div style="margin-bottom:1rem;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Minimum 6 characters" required>
            </div>
            <div style="margin-bottom:1rem;">
                <label>Account Type</label>
                <select name="role" id="roleSelect" onchange="toggleDoctorCode(this.value)">
                    <option value="patient">👤 Patient</option>
                    <option value="doctor">👨‍⚕️ Doctor</option>
                </select>
            </div>
            <div id="doctorCodeDiv" style="margin-bottom:1rem; display:none;">
                <label>Doctor Registration Code</label>
                <input type="text" name="doctor_code" placeholder="e.g. DOC002" id="doctorCode">
                <small style="color:#718096; font-size:0.8rem;">Issued by hospital admin</small>
            </div>
            <button type="submit" class="btn btn-accent" style="width:100%; font-size:1rem; padding:12px; margin-top:0.5rem;">Create Account →</button>
        </form>
        <p style="text-align:center; margin-top:1.2rem; font-size:0.9rem; color:#718096;">
            Already have an account? <a href="{{ url_for('login') }}" style="color:#0d9488; font-weight:600;">Login</a>
        </p>
    </div>
</div>
<script>
function toggleDoctorCode(val) {
    document.getElementById("doctorCodeDiv").style.display = val==="doctor" ? "block" : "none";
    document.getElementById("doctorCode").required = val==="doctor";
}
</script>
{% endblock %}
