{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:420px; margin:3rem auto;">
    <div class="card">
        <div style="text-align:center; margin-bottom:1.8rem;">
            <div style="font-size:2.8rem;">🔐</div>
            <h2 style="margin-top:0.5rem;">Welcome Back</h2>
            <p style="color:#718096; font-size:0.9rem;">Login to your DiabetAI account</p>
        </div>
        <form method="POST">
            <div style="margin-bottom:1rem;">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div style="margin-bottom:1.5rem;">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; font-size:1rem; padding:12px;">Login →</button>
        </form>
        <p style="text-align:center; margin-top:1.2rem; font-size:0.9rem; color:#718096;">
            Don't have an account? <a href="{{ url_for('signup') }}" style="color:#0d9488; font-weight:600;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
